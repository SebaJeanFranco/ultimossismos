<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba de generación de mapa</title>
  <style>
    :root{--bg:#020617;--panel:#0f172a;--panel2:#081225;--border:#1e3358;--text:#eef4ff;--muted:#93a8c7}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    body{padding:22px}
    .layout{display:grid;grid-template-columns:340px 1fr;gap:18px;max-width:1280px;margin:0 auto}
    .card{border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,var(--panel),var(--panel2));box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .left{padding:18px}
    h1{margin:0 0 10px;font-size:24px}
    p{color:var(--muted);line-height:1.5}
    label{display:flex;flex-direction:column;gap:6px;margin:12px 0}
    input{width:100%;min-height:46px;border:1px solid #31486d;border-radius:12px;background:#0a162a;color:#fff;padding:10px 12px;font-size:16px;font-weight:700}
    button{width:100%;min-height:46px;margin-top:10px;border:none;border-radius:12px;background:linear-gradient(180deg,#0ea5e9,#1d4ed8);color:#fff;font-weight:800;cursor:pointer}
    .sign-row{display:grid;grid-template-columns:1fr 48px;gap:8px;align-items:center}
    .sign-row button{margin-top:0;font-size:20px;background:linear-gradient(180deg,#1e3a5f,#0f1f3a);border:1px solid #315887}
    .status{margin-top:12px;font-size:13px;color:#cfe0ff;min-height:22px}
    .preview{padding:12px;min-height:760px}
    iframe{width:100%;height:730px;border:none;border-radius:14px;background:#07111f}
    @media (max-width: 920px){body{padding:0}.layout{grid-template-columns:1fr;gap:0}.card{border-radius:0;border-left:0;border-right:0}.preview{min-height:520px}iframe{height:480px}}
    @media (max-width: 520px){.left{padding:14px}iframe{height:360px}.preview{padding:10px;min-height:400px}}
  </style>
</head>
<body>
  <div class="layout">
    <section class="card left">
      <h1>Generar mapa</h1>
      <p>Prueba rápida del Web App de Google Apps Script. Edita la constante <b>MAPA_PREVIEW_WEBAPP_URL</b> en este archivo antes de usarlo.</p>
      <label>Latitud
        <div class="sign-row">
          <input id="latitud" type="text" inputmode="decimal" autocomplete="off" placeholder="Ej: -19.101">
          <button id="signoLat" type="button" title="Cambiar signo">±</button>
        </div>
      </label>
      <label>Longitud
        <div class="sign-row">
          <input id="longitud" type="text" inputmode="decimal" autocomplete="off" placeholder="Ej: -69.372">
          <button id="signoLon" type="button" title="Cambiar signo">±</button>
        </div>
      </label>
      <label>Magnitud
        <input id="magnitud" type="text" inputmode="decimal" autocomplete="off" placeholder="Ej: 4.2">
      </label>
      <label>Zoom manual
        <select id="zoom" style="width:100%;min-height:46px;border:1px solid #31486d;border-radius:12px;background:#0a162a;color:#fff;padding:10px 12px;font-size:16px;font-weight:700">
          <option value="">Selecciona zoom</option>
          <option value="5">5 · Muy amplio</option>
          <option value="6">6 · Amplio</option>
          <option value="7">7 · Medio</option>
          <option value="8">8 · Cercano</option>
          <option value="9">9 · Muy cercano</option>
        </select>
      </label>
      <button id="btnGenerar">Generar</button>
      <div id="estado" class="status">Completa latitud, longitud, magnitud y zoom.</div>
    </section>
    <section class="card preview">
      <iframe id="framePreview" srcdoc="<html><body style='margin:0;display:grid;place-items:center;min-height:100vh;background:#07111f;color:#dbeafe;font-family:Arial,sans-serif'>Aquí aparecerá la previsualización del mapa.</body></html>"></iframe>
    </section>
  </div>

  <script>
    const MAPA_PREVIEW_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwuN9-AjF6fyU_3Y8lkeB-sNFqOijE1LkwC7HWnW7xdukxf0sLKQEAIihlUSxiN5g754A/exec";
    const latitud = document.getElementById('latitud');
    const longitud = document.getElementById('longitud');
    const magnitud = document.getElementById('magnitud');
    const zoom = document.getElementById('zoom');
    const signoLat = document.getElementById('signoLat');
    const signoLon = document.getElementById('signoLon');
    const btnGenerar = document.getElementById('btnGenerar');
    const estado = document.getElementById('estado');
    const framePreview = document.getElementById('framePreview');

    function normalizar(valor) {
      return String(valor || '').trim().replace(',', '.');
    }

    function cambiarSigno(input) {
      let valor = normalizar(input.value);
      if (!valor) input.value = '-';
      else if (valor.startsWith('-')) input.value = valor.substring(1);
      else input.value = '-' + valor;
      input.focus();
    }

    signoLat.addEventListener('click', () => cambiarSigno(latitud));
    signoLon.addEventListener('click', () => cambiarSigno(longitud));

    btnGenerar.addEventListener('click', () => {
      if (!MAPA_PREVIEW_WEBAPP_URL || MAPA_PREVIEW_WEBAPP_URL.includes('PEGA_AQUI')) {
        estado.textContent = 'Configura primero la URL del Web App en este archivo.';
        return;
      }

      const lat = normalizar(latitud.value);
      const lon = normalizar(longitud.value);
      const mag = normalizar(magnitud.value);
      const zoomValor = normalizar(zoom.value);

      if (!lat || !lon || !mag || !zoomValor || isNaN(Number(lat)) || isNaN(Number(lon)) || isNaN(Number(mag))) {
        estado.textContent = 'Debes completar latitud, longitud, magnitud y zoom con valores válidos.';
        return;
      }

      const params = new URLSearchParams({
        action: 'previewPage',
        latitud: lat,
        longitud: lon,
        magnitud: mag,
        zoom: zoomValor,
        ts: Date.now().toString()
      });

      estado.textContent = `Generando mapa con zoom ${zoomValor}...`; 
      framePreview.src = MAPA_PREVIEW_WEBAPP_URL + '?' + params.toString();
      framePreview.onload = () => estado.textContent = `Mapa generado con zoom ${zoomValor}.`; 
    });
  </script>
</body>
</html>
