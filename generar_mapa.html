<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba de generación de mapa</title>
  <style>
    :root{--bg:#020617;--panel:#0f172a;--panel2:#081225;--border:#1e3358;--text:#eef4ff;--muted:#93a8c7}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    body{padding:22px}
    .layout{display:grid;grid-template-columns:340px 1fr;gap:18px;max-width:1280px;margin:0 auto}
    .card{border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,var(--panel),var(--panel2));box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .left{padding:18px}
    h1{margin:0 0 10px;font-size:24px}
    p{color:var(--muted);line-height:1.5}
    label{display:flex;flex-direction:column;gap:6px;margin:12px 0}
    input{width:100%;min-height:42px;border:1px solid #31486d;border-radius:12px;background:#0a162a;color:#fff;padding:10px 12px;font-size:14px;font-weight:700}
    button{width:100%;min-height:44px;margin-top:10px;border:none;border-radius:12px;background:linear-gradient(180deg,#0ea5e9,#1d4ed8);color:#fff;font-weight:800;cursor:pointer}
    .status{margin-top:12px;font-size:13px;color:#cfe0ff;min-height:22px}
    .preview{padding:12px;min-height:760px}
    iframe{width:100%;height:730px;border:none;border-radius:14px;background:#07111f}
    @media (max-width: 920px){.layout{grid-template-columns:1fr}.preview{min-height:520px}iframe{height:480px}}
  </style>
</head>
<body>
  <div class="layout">
    <section class="card left">
      <h1>Generar mapa</h1>
      <p>Prueba rápida del Web App de Google Apps Script. Edita la constante <b>MAPA_PREVIEW_WEBAPP_URL</b> en este archivo antes de usarlo.</p>
      <label>Latitud
        <input id="latitud" type="number" step="any" min="-90" max="90" placeholder="Ej: -19.101">
      </label>
      <label>Longitud
        <input id="longitud" type="number" step="any" min="-180" max="180" placeholder="Ej: -69.372">
      </label>
      <label>Magnitud
        <input id="magnitud" type="number" step="0.1" min="0" max="10" placeholder="Ej: 4.2">
      </label>
      <button id="btnGenerar">Generar</button>
      <div id="estado" class="status">Completa los tres campos.</div>
    </section>
    <section class="card preview">
      <iframe id="framePreview" srcdoc="<html><body style='margin:0;display:grid;place-items:center;min-height:100vh;background:#07111f;color:#dbeafe;font-family:Arial,sans-serif'>Aquí aparecerá la previsualización del mapa.</body></html>"></iframe>
    </section>
  </div>

  <script>
    const MAPA_PREVIEW_WEBAPP_URL = "PEGA_AQUI_TU_URL_DE_WEBAPP_DE_GOOGLE_APPS_SCRIPT";
    const latitud = document.getElementById('latitud');
    const longitud = document.getElementById('longitud');
    const magnitud = document.getElementById('magnitud');
    const btnGenerar = document.getElementById('btnGenerar');
    const estado = document.getElementById('estado');
    const framePreview = document.getElementById('framePreview');

    btnGenerar.addEventListener('click', () => {
      if (!MAPA_PREVIEW_WEBAPP_URL || MAPA_PREVIEW_WEBAPP_URL.includes('PEGA_AQUI')) {
        estado.textContent = 'Configura primero la URL del Web App en este archivo.';
        return;
      }

      if (!latitud.value || !longitud.value || !magnitud.value) {
        estado.textContent = 'Debes completar latitud, longitud y magnitud.';
        return;
      }

      const params = new URLSearchParams({
        action: 'previewPage',
        latitud: latitud.value,
        longitud: longitud.value,
        magnitud: magnitud.value,
        ts: Date.now().toString()
      });

      estado.textContent = 'Generando mapa...';
      framePreview.src = MAPA_PREVIEW_WEBAPP_URL + '?' + params.toString();
      framePreview.onload = () => estado.textContent = 'Mapa generado.';
    });
  </script>
</body>
</html>
